apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-deployer
  namespace: kubeflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-patcher
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-deployer-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: pipeline-deployer
    namespace: kubeflow
roleRef:
  kind: Role
  name: deployment-patcher
  apiGroup: rbac.authorization.k8s.io
