# PIPELINE DEFINITION
# Name: iris-advanced-mlops-pipeline
# Description: Fetch, validate, parallel hyperparameter-tune, select best, compare vs champion, register+deploy if better
components:
  comp-condition-1:
    dag:
      tasks:
        register-model:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-register-model
          inputs:
            artifacts:
              model:
                componentInputArtifact: pipelinechannel--select-best-model-best_model
            parameters:
              accuracy:
                componentInputParameter: pipelinechannel--select-best-model-best_accuracy
              config:
                componentInputParameter: pipelinechannel--select-best-model-best_config
          taskInfo:
            name: register-model
    inputDefinitions:
      artifacts:
        pipelinechannel--select-best-model-best_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--get-champion-accuracy-Output:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--select-best-model-best_accuracy:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--select-best-model-best_config:
          parameterType: STRING
  comp-fetch-data:
    executorLabel: exec-fetch-data
    outputDefinitions:
      artifacts:
        output_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-get-champion-accuracy:
    executorLabel: exec-get-champion-accuracy
    outputDefinitions:
      parameters:
        Output:
          parameterType: NUMBER_DOUBLE
  comp-register-model:
    executorLabel: exec-register-model
    inputDefinitions:
      artifacts:
        model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        accuracy:
          parameterType: NUMBER_DOUBLE
        config:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        registered_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
  comp-select-best-model:
    executorLabel: exec-select-best-model
    inputDefinitions:
      artifacts:
        model_a:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        model_b:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        model_c:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        accuracy_a:
          parameterType: NUMBER_DOUBLE
        accuracy_b:
          parameterType: NUMBER_DOUBLE
        accuracy_c:
          parameterType: NUMBER_DOUBLE
        config_a:
          parameterType: STRING
        config_b:
          parameterType: STRING
        config_c:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        best_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        best_accuracy:
          parameterType: NUMBER_DOUBLE
        best_config:
          parameterType: STRING
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      artifacts:
        input_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        max_depth:
          parameterType: NUMBER_INTEGER
        n_estimators:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        model_output:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        accuracy:
          parameterType: NUMBER_DOUBLE
        config_name:
          parameterType: STRING
  comp-train-model-2:
    executorLabel: exec-train-model-2
    inputDefinitions:
      artifacts:
        input_csv:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        max_depth:
          parameterType: NUMBER_INTEGER
        n_estimators:
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        model_output:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        accuracy:
          parameterType: NUMBER_DOUBLE
        config_name:
          parameterType: STRING
  comp-train-model-3:
    executorLabel: exec-train-model-3
    inputDefinitions:
      artifacts:
        input_csv:
          artifactType:
            schemaTitle: system.Dataset
